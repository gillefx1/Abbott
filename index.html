
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Abbott Apps</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f2f2f7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <style>
    :root {
      --ios-bg: #f2f2f7;
      --ios-card: #ffffff;
      --abbott-blue: #004b87;
      --text-main: #1c1c1e;
    }

    body {
      margin: 0;
      padding: 20px 16px 40px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background: var(--ios-bg);
      color: var(--text-main);
    }

    /* Logo */
    .logo {
      text-align: center;
      margin: 10px 0 28px;
    }

    .logo img {
      max-width: 200px;
    }

    /* Grille iOS : 2 apps max */
    .app-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
      max-width: 420px;
      margin: 0 auto;
    }

    .app {
      text-decoration: none;
      color: inherit;
      text-align: center;
    }

    .app-icon {
      background: var(--ios-card);
      border-radius: 22px;
      padding: 22px 0;
      box-shadow: 0 8px 16px rgba(0,0,0,0.08);
      transition: transform 0.12s ease;
    }

    .app:active .app-icon {
      transform: scale(0.96);
    }

    .app-icon img {
      width: 64px;
      height: 64px;
    }

    .app-label {
      margin-top: 10px;
      font-size: 14px;
      font-weight: 600;
      color: var(--abbott-blue);
    }
  </style>
</head>

<body>

  <!-- Logo -->
  <div class="logo">
    <img src="Abbottlogo_2.png" alt="Abbott">
  </div>

  <!-- Apps -->
  <div class="app-grid">

    <a class="app" target="_blank"
       href="https://forms.office.com/pages/responsepage.aspx?id=V40mW28qBE6w3mk4WD1evKLq21s3LwhPggyn0MDS_MdUQlJFN1VFTFpBUjFTTzNJQlpKRjhQVzQ3UC4u&route=shorturl">
      <div class="app-icon">
        <img src="icon-planning.png" alt="">
      </div>
      <div class="app-label">Ajout planning</div>
    </a>

    <a class="app" target="_blank"
       href="https://forms.office.com/Pages/ResponsePage.aspx?id=V40mW28qBE6w3mk4WD1evKLq21s3LwhPggyn0MDS_MdUNVVDN1FTRVZLVUQ2OE05MjIxNVpOQlJIOS4u">
      <div class="app-icon">
        <img src="icon-merlin.png" alt="">
      </div>
      <div class="app-label">Commande Merlin</div>
    </a>

    <a class="app" target="_blank"
       href="https://forms.office.com/pages/responsepage.aspx?id=V40mW28qBE6w3mk4WD1evKLq21s3LwhPggyn0MDS_MdUQ0NQSkcwMlRJT1lVOEJTWFJCQUVLSEk0Ti4u">
      <div class="app-icon">
        <img src="icon-materiel.png" alt="">
      </div>
      <div class="app-label">Commande matériel</div>
    </a>

    <a class="app" target="_blank"
       href="https://xiam-md.oneabbott.com/fim">
      <div class="app-icon">
        <img src="icon-xiam.png" alt="">
      </div>
      <div class="app-label">Consignment Count</div>
    </a>

  </div>

</body>
</html>
