
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Liens Abbott</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#004b87">

  <style>
    :root {
      --abbott-blue: #004b87;
      --abbott-light: #e6f0f8;
      --bg-light: #ffffff;
      --bg-dark: #121212;
      --text-light: #003b6f;
      --text-dark: #ffffff;
      --card-dark: #1e1e1e;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: var(--bg-light);
      color: var(--text-light);
    }

    /* Mode sombre automatique */
    @media (prefers-color-scheme: dark) {
      body {
        background: var(--bg-dark);
        color: var(--text-dark);
      }
      .app-icon {
        background: var(--card-dark);
      }
    }

    .logo {
      text-align: center;
      margin-bottom: 25px;
    }

    .logo img {
      max-width: 220px;
    }

    .app-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 22px;
      max-width: 520px;
      margin: 0 auto;
    }

    .app {
      text-align: center;
      text-decoration: none;
      color: inherit;
    }

    .app-icon {
      background: var(--abbott-light);
      border-radius: 22px;
      padding: 20px;
      box-shadow: 0 6px 10px rgba(0,0,0,0.12);
      transition: transform 0.1s ease;
    }

    .app-icon:hover {
      transform: scale(1.06);
    }

    .app-icon img {
      width: 64px;
      height: 64px;
    }

    .app-label {
      margin-top: 10px;
      font-size: 15px;
      font-weight: 600;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="logo">
    <img src="logo-abbott.png" alt="Abbott">
  </div>

  <div class="app-grid">

    <a class="app" target="_blank"
       href="https://forms.office.com/pages/responsepage.aspx?id=V40mW28qBE6w3mk4WD1evKLq21s3LwhPggyn0MDS_MdUQlJFN1VFTFpBUjFTTzNJQlpKRjhQVzQ3UC4u&route=shorturl">
      <div class="app-icon">
        <img src="icon-planning.svg">
      </div>
      <div class="app-label">Ajout au planning</div>
    </a>

    <a class="app" target="_blank"
       href="https://forms.office.com/Pages/ResponsePage.aspx?id=V40mW28qBE6w3mk4WD1evKLq21s3LwhPggyn0MDS_MdUNVVDN1FTRVZLVUQ2OE05MjIxNVpOQlJIOS4u">
      <div class="app-icon">
        <img src="icon-merlin.svg">
      </div>
      <div class="app-label">Commande Merlin</div>
    </a>

    <a class="app" target="_blank"
       href="https://forms.office.com/pages/responsepage.aspx?id=V40mW28qBE6w3mk4WD1evKLq21s3LwhPggyn0MDS_MdUQ0NQSkcwMlRJT1lVOEJTWFJCQUVLSEk0Ti4u">
      <div class="app-icon">
        <img src="icon-materiel.svg">
      </div>
      <div class="app-label">Commande matériel</div>
    </a>

    <a class="app" target="_blank"
       href="https://xiam-md.oneabbott.com/fim">
      <div class="app-icon">
        <img src="icon-xiam.png">
      </div>
      <div class="app-label">XIAM</div>
    </a>

  </div>

</body>
</html>
