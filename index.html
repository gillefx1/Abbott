<!DOCTYPE html>
<html lang="fr">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Abbott Apps</title>

<style>
:root{
  --ios-bg:#f2f2f7;
  --ios-card:#ffffff;
  --abbott-blue:#004b87;
}

body{
  margin:0;
  padding:20px 16px 40px;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
  background:var(--ios-bg);
}

.logo{text-align:center;margin:10px 0 28px;}
.logo img{max-width:200px;}

.app-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:18px;
  max-width:420px;
  margin:0 auto;
}

.app{
  text-decoration:none;
  color:inherit;
  text-align:center;
  cursor:pointer;
}

.app-icon{
  background:var(--ios-card);
  border-radius:22px;
  padding:22px 0;
  box-shadow:0 8px 16px rgba(0,0,0,.08);
}

.app-icon img{width:64px;height:64px;}

.app-label,.folder-label{
  margin-top:10px;
  font-size:14px;
  font-weight:600;
  color:var(--abbott-blue);
}

/* Aperçu dossiers */
.folder-icon{padding:12px;}
.folder-preview{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:6px;
  width:64px;
  height:64px;
  margin:0 auto;
}
.folder-preview img{width:100%;height:100%;object-fit:contain;}

/* Overlay + blur iOS */
.folder-overlay{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,.30);
  backdrop-filter:blur(18px) saturate(180%);
  -webkit-backdrop-filter:blur(18px) saturate(180%);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1000;
}
.folder-overlay.active{display:flex;}

.folder-content{
  background:rgba(255,255,255,.94);
  border-radius:30px;
  padding:24px;
  width:90%;
  max-width:420px;
  box-shadow:0 20px 40px rgba(0,0,0,.25);
  animation:openFolder .25s ease;
}

.folder-header{
  display:flex;
  justify-content:space-between;
  font-weight:700;
  color:var(--abbott-blue);
  margin-bottom:18px;
}

.folder-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:16px;
}

@keyframes openFolder{
  from{transform:scale(.92);opacity:0}
  to{transform:scale(1);opacity:1}
}
</style>
</head>

<body>

<div class="logo">
  Abbottlogo_2.png
</div>

<!-- ================= LIENS DIRECTS ================= -->
<div class="app-grid">

<!-- 1 -->
<a class="app" target="_blank"

  <div class="app-icon"><img src="icon-planning.png"></div>
  <div class="app-label">Ajout planning</div>
</a>

<!-- 2 -->
<a class="app" target="_blank"

  <div class="app-icon"><img src="icon-materiel.png"></div>
  <div class="app-label">Commande matériel</div>
</a>

<!-- 3 -->
<a class="app" target="_blank"
   href="https://xiam-md.oneabbott.com/fim">
  <div class="app-icon"><img src="icon-xiam.png"></div>
  <div class="app-label">Consignment Count</div>
</a>

<!-- 4 (remplacement) -->
<a class="app" target="_blank"
   href="https://forms.cloud.microsoft/r/LGy2zXFguz">
  <div class="app-icon"><img src="icon-form.png"></div>
  <div class="app-label">Formulaire d’implantation</div>

<!-- 5 (nouveau) -->
<a class="app" target="_blank"
   href="https://forms.cloud.microsoft/r/ddPZnBPVP5">

  <div class="app-label">Merlin Upgrade</div>
</a>

<!-- ================= DOSSIERS ================= -->

<div class="app" onclick="openFolder('merlin')">

      <img src="icon-merlin.png">

      <img src="icon-LERN.png">

<div class="app" onclick="openFolder('finance')">

<div class="app" onclick="openFolder('fsca')">

<div class="app" onclick="openFolder('autre')">

    </div>
  </div>
  <div class="folder-label">Autre</div>

</div>

<script>
function openFolder(id){document.getElementById(id).classList.add('active')}
function closeFolder(id){document.getElementById(id).classList.remove('active')}
</script>

</body>
</html>
