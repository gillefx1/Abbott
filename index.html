
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Abbott Apps</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f2f2f7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <style>
    :root {
      --ios-bg: #f2f2f7;
      --ios-card: #ffffff;
      --abbott-blue: #004b87;
      --text-main: #1c1c1e;
    }

    body {
      margin: 0;
      padding: 20px 16px 40px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background: var(--ios-bg);
      color: var(--text-main);
    }

    .logo {
      text-align: center;
      margin: 10px 0 28px;
    }

    .logo img {
      max-width: 200px;
    }

    .app-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
      max-width: 420px;
      margin: 0 auto;
    }

    .app {
      text-decoration: none;
      color: inherit;
      text-align: center;
    }

    .app-icon {
      background: var(--ios-card);
      border-radius: 22px;
      padding: 22px 0;
      box-shadow: 0 8px 16px rgba(0,0,0,0.08);
      transition: transform 0.12s ease;
    }

    .app:active .app-icon {
      transform: scale(0.96);
    }

    .app-icon img {
      width: 64px;
      height: 64px;
    }

    .app-label {
      margin-top: 10px;
      font-size: 14px;
      font-weight: 600;
      color: var(--abbott-blue);
    }
  </style>
</head>

<body>

  <!-- Logo -->
  <div class="logo">
    <img src="Abbottlogo_2.png" alt="Abbott">
  </div>

  <!-- Apps -->
  <div class="app-grid">

      <div class="app-icon">

      <div class="app-icon">

</html>
