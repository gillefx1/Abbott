<!DOCTYPE html>
<html lang="fr">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Abbott Apps</title>

<style>
:root{
  --ios-bg:#f2f2f7;
  --ios-card:#ffffff;
  --abbott-blue:#004b87;
}

body{
  margin:0;
  padding:20px 16px 40px;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
  background:var(--ios-bg);
}

/* LOGO */
.logo{text-align:center;margin:10px 0 28px;}
.logo img{max-width:200px;}

/* GRID */
.app-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:18px;
  max-width:420px;
  margin:0 auto;
}

/* APP */
.app{text-decoration:none;color:inherit;text-align:center;cursor:pointer;}
.app-icon{
  background:var(--ios-card);
  border-radius:22px;
  padding:22px 0;
  box-shadow:0 8px 16px rgba(0,0,0,.08);
}
.app-icon img{width:64px;height:64px;}
.app-label,.folder-label{
  margin-top:10px;
  font-size:14px;
  font-weight:600;
  color:var(--abbott-blue);
}

/* FOLDER PREVIEW */
.folder-icon{padding:12px;}
.folder-preview{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:6px;
  width:64px;
  height:64px;
  margin:0 auto;
}
.folder-preview img{width:100%;height:100%;object-fit:contain;}
.folder-empty{
  height:64px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  color:var(--abbott-blue);
}

/* BLUR iOS */
.folder-overlay{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,.25);
  backdrop-filter:blur(18px) saturate(180%);
  -webkit-backdrop-filter:blur(18px) saturate(180%);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}
.folder-overlay.active{display:flex;}

.folder-content{
  background:rgba(255,255,255,.94);
  border-radius:30px;
  padding:24px;
  width:90%;
  max-width:420px;
  box-shadow:0 20px 40px rgba(0,0,0,.25);
  animation:openFolder .25s ease;
}

.folder-header{
  display:flex;
  justify-content:space-between;
  font-weight:700;
  color:var(--abbott-blue);
  margin-bottom:18px;
}

.folder-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:16px;
}

@keyframes openFolder{
  from{transform:scale(.92);opacity:0}
  to{transform:scale(1);opacity:1}
}
</style>
</head>

<body>

<div class="logo">Abbottlogo_2.png</div>

<!-- ================= GRID PRINCIPALE ================= -->
<div class="app-grid">

<!-- 4 APPS DIRECTES -->
<a class="app" target="_blank" href="https://forms.office.com/pages/responsepage.aspx?id=V40mW28qBE6w3mk4WD1evKLq21s3LwhPggyn0MDS_MdUQlJFN1VFTFpBUjFTTzNJQlpKRjhQVzQ3UC4u&route=shorturl">

  <div class="app-icon"><img src="icon-materiel.png"></div>
  <div class="app-label">Commande matériel</div>

<a class="app" target="_blank" href="https://xiam-md.oneabbott.com/fim">

<a class="app" target="_blank" href="https://xiam-md.oneabbott.com/fim/">

      <img src="icon-merlin.png">
    </div>
  </div>
  <div class="folder-label">Merlin</div>
</div>

<div class="app" onclick="openFolder('resources')">
  <div class="app-icon folder-icon">
    <div class="folder-preview">
      <img src="icon-CSP.png">
      <img src="icon-aveir.png">
      <img src="icon-assert.png">

<a class="app" target="_blank" href="https://forms.office.com/Pages/ResponsePage.aspx?id=V40mW28qBE6w3mk4WD1evKLq21s3LwhPggyn0MDS_MdUNVVDN1FTRVZLVUQ2OE05MjIxNVpOQlJIOS4u">
  <div class="app-icon"><img src="icon-merlin.png"></div>
  <div class="app-label">Commande Merlin</div>

<a class="app" target="_blank" href="https://www.merlin.net/">

</div>

<!-- ================= DOSSIER RESSOURCES ================= -->

<div class="folder-content" onclick="event.stopPropagation()">
<div class="folder-header">Autre <span onclick="closeFolder('autre')">✕</span></div>
<div class="folder-grid">

<a class="app" target="_blank" href="https://app.powerbi.com/groups/me/apps/169567ac-bf9f-4056-b380-1fc6eaa6d185/reports/d0700510-63d1-4b7d-84bb-e9ee0abad2cb">

<a class="app" target="_blank" href="https://abbottprod.service-now.com/esc">

</a>

<a class="app" target="_blank" href="https://abbott.etq.com/prod/reliance">

</div>
</div>
</div>

<script>
function openFolder(id){document.getElementById(id).classList.add('active')}
function closeFolder(id){document.getElementById(id).classList.remove('active')}
</script>

</body>
</html>
