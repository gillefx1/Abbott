
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Liens utiles Abbott</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #ffffff;
      margin: 0;
      padding: 20px;
    }

    /* Logo */
    .logo {
      text-align: center;
      margin-bottom: 25px;
    }
    .logo img {
      max-width: 220px;
    }

    /* Grille type apps */
    .app-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 20px;
      max-width: 500px;
      margin: 0 auto;
    }

    .app {
      text-align: center;
      text-decoration: none;
      color: #004b87; /* Bleu Abbott */
    }

    .app-icon {
      background: #e6f0f8; /* Bleu clair Abbott */
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.08);
      transition: transform 0.1s ease;
    }

    .app-icon:hover {
      transform: scale(1.05);
    }

    .app-icon img {
      width: 64px;
      height: 64px;
    }

    .app-label {
      margin-top: 10px;
      font-size: 15px;
      font-weight: 600;
    }
  </style>
</head>

<body>

  <!-- Logo -->
  <div class="logo">
    <img src="Abbottlogo_3.png" alt="Abbott">
  </div>

  <!-- Grille d'apps -->
  <div class="app-grid">

    <a class="app"
       href="https://forms.office.com/pages/responsepage.aspx?id=V40mW28qBE6w3mk4WD1evKLq21s3LwhPggyn0MDS_MdUQlJFN1VFTFpBUjFTTzNJQlpKRjhQVzQ3UC4u&route=shorturl"
       target="_blank">
      <div class="app-icon">
        <img src="icon-planning.png" alt="">
      </div>
      <div class="app-label">Ajout au planning</div>
    </a>

    <a class="app"
       href="https://forms.office.com/Pages/ResponsePage.aspx?id=V40mW28qBE6w3mk4WD1evKLq21s3LwhPggyn0MDS_MdUNVVDN1FTRVZLVUQ2OE05MjIxNVpOQlJIOS4u"
       target="_blank">
      <div class="app-icon">
        <img src="icon-merlin.png" alt="">
      </div>
      <div class="app-label">Commande de Merlin</div>
    </a>

    <a class="app"
       href="https://forms.office.com/pages/responsepage.aspx?id=V40mW28qBE6w3mk4WD1evKLq21s3LwhPggyn0MDS_MdUQ0NQSkcwMlRJT1lVOEJTWFJCQUVLSEk0Ti4u&route=shorturl"
       target="_blank">
      <div class="app-icon">
        <img src="icon-materiel.png" alt="">
      </div>
      <div class="app-label">Commande de matériel</div>
    </a>

  </div>

</body>
</html>
