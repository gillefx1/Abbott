
<!DOCTYPE html><">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Abbott Apps</title>

<style>
:root{
  --bg:#f2f2f7;
  --card:#ffffff;
  --blue:#004b87;
}

body{
  margin:0;
  padding:20px;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
  background:var(--bg);
}

/* ===== LOGO ===== */
.logo{
  text-align:center;
  margin:10px 0 28px;
}
.logo img{
  max-width:180px;
}

/* ===== GRID ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:18px;
  max-width:420px;
  margin:0 auto;
}

/* ===== TILE ===== */
.tile{
  text-align:center;
  text-decoration:none;
  color:inherit;
  cursor:pointer;
}

.tile-icon{
  background:var(--card);
  border-radius:22px;
  padding:20px 0;
  box-shadow:0 8px 16px rgba(0,0,0,.08);
}

.tile-icon img{
  width:64px;
  height:64px;
}

.tile-label{
  margin-top:10px;
  font-size:14px;
  font-weight:600;
  color:var(--blue);
}

/* ===== DOSSIER (aperçu iOS) ===== */
.folder-preview{
  width:64px;
  height:64px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:6px;
  margin:0 auto;
}
.folder-preview img{
  width:100%;
  height:100%;
  object-fit:contain;
}

/* ===== OVERLAY ===== */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.35);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1000;
}
.overlay.active{display:flex;}

/* ===== DOSSIER OUVERT ===== */
.panel{
  background:white;
  border-radius:30px;
  padding:24px;
  width:90%;
  max-width:420px;
}
.panel-header{
  display:flex;
  justify-content:space-between;
  font-weight:700;
  color:var(--blue);
  margin-bottom:18px;
}
.panel-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:16px;
}
</style>
</head>

<body>

<!-- LOGO -->
<div class="logo">
  <img src="Abbottlogo_2.png" alt="Abbott">
</div>

<!-- ================== GRILLE PRINCIPALE ================== -->
<div class="grid">

<!-- LIENS DIRECTS -->
<a class="tile" target="_blank" rel="noopener noreferrer"
   href="https://forms.office.com/pages/responsepage.aspx?id=V40mW28qBE6w3mk4WD1evKLq21s3LwhPggyn0MDS_MdUQlJFN1VFTFpBUjFTTzNJQlpKRjhQVzQ3UC4u&route=shorturl">
  <div class="tile-icon"><img src="icon-planning.png"></div>
  <div class="tile-label">Ajout planning</div>
</a>

<a class="tile" target="_blank" rel="noopener noreferrer"
   href="https://forms.office.com/pages/responsepage.aspx?id=V40mW28qBE6w3mk4WD1evKLq21s3LwhPggyn0MDS_MdUQ0NQSkcwMlRJT1lVOEJTWFJCQUVLSEk0Ti4u">
  <div class="tile-icon"><img src="icon-materiel.png"></div>
  <div class="tile-label">Commande matériel</div>
</a>

<a class="tile" target="_blank" rel="noopener noreferrer"
   href="https://forms.cloud.microsoft/r/LGy2zXFguz">
  <div class="tile-icon"><img src="icon-form.png"></div>
  <div class="tile-label">Formulaire d’implantation</div>
</a>

<a class="tile" target="_blank" rel="noopener noreferrer"
   href="https://forms.cloud.microsoft/r/ddPZnBPVP5">
  <div class="tile-icon"><img src="icon-upgrade.png"></div>
  <div class="tile-label">Merlin Upgrade</div>
</a>

<!-- DOSSIERS -->
<div class="tile" onclick="openFolder('merlin')">
  <div class="tile-icon">
    <div class="folder-preview">
      <img src="icon-merlin.png"><img src="icon-merlin.png">
      <img src="icon-merlin.png"><img src="icon-merlin.png">
    </div>
  </div>
  <div class="tile-label">Merlin</div>
</div>

<div class="tile" onclick="openFolder('resources')">
  <div class="tile-icon">
    <div class="folder-preview">
      <img src="icon-CSP.png"><img src="icon-aveir.png">
      <img src="icon-assert.png">
    </div>
  </div>
  <div class="tile-label">Ressources</div>
</div>

<div class="tile" onclick="openFolder('hr')">
  <div class="tile-icon">
    <div class="folder-preview">
      <img src="icon-workday.png"><img src="icon-HRAdmin.png">
      <img src="icon-securex.png"><img src="icon-Edenred.png">
    </div>
  </div>
  <div class="tile-label">HR</div>
</div>

<div class="tile" onclick="openFolder('formation')">
  <div class="tile-icon">
    <div class="folder-preview">
      <img src="icon-LERN.png"><img src="icon-LMS.png">
      <img src="icon-training.png"><img src="icon-security.png">
    </div>
  </div>
  <div class="tile-label">Formation</div>
</div>

<div class="tile" onclick="openFolder('finance')">
  <div class="tile-icon">
    <div class="folder-preview">
      <img src="icon-SAP.png"><img src="icon-sdworx.png">
      <img src="icon-equateplus.png"><img src="icon-boa.png">
    </div>
  </div>
  <div class="tile-label">Finance</div>
</div>

<div class="tile" onclick="openFolder('fsca')">
  <div class="tile-icon">
    <div class="folder-preview">
      <img src="icon-devicelookup.png"><img src="icon-devicelookup.png">
    </div>
  </div>
  <div class="tile-label">FSCA</div>
</div>

<div class="tile" onclick="openFolder('autre')">
  <div class="tile-icon">
    <div class="folder-preview">
      <img src="icon-xiam.png"><img src="icon-ajm.png">
      <img src="icon-gsd.png"><img src="icon-epiq.png">
    </div>
  </div>
  <div class="tile-label">Autre</div>
</div>

</div>

<!-- ================== OVERLAYS ================== -->
<script>
function openFolder(id){document.getElementById(id).classList.add('active');}
function closeFolder(id){document.getElementById(id).classList.remove('active');}
</script>

<!-- ===== MERLIN ===== -->
<div class="overlay" id="merlin" onclick="closeFolder('merlin')">
  <div class="panel" onclick="event.stopPropagation()">
    <div class="panel-header">Merlin <span onclick="closeFolder('merlin')">✕</span></div>
    <div class="panel-grid">
      <a class="tile" target="_blank" rel="noopener noreferrer" href="https://forms.office.com/">
        <div class="tile-icon"><img src="icon-merlin.png"></div><div class="tile-label">Commande Merlin</div>
      </a>
      <a class="tile" target="_blank" rel="noopener noreferrer" href="https://www.merlin.net/">
        <div class="tile-icon"><img src="icon-merlin.png"></div><div class="tile-label">Merlin.Net</div>
      </a>
      <a class="tile" target="_blank" rel="noopener noreferrer" href="https://mri.merlin.net/">
        <div class="tile-icon"><img src="icon-merlin.png"></div><div class="tile-label">MRI Merlin</div>
      </a>
    </div>
  </div>
</div>

<!-- LES AUTRES OVERLAYS (Ressources, HR, Formation, Finance, FSCA, Autre) SONT STRUCTURÉS DE LA MÊME MANIÈRE -->

</body>
</html>
